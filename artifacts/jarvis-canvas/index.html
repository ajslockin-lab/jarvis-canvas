<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      PWA install + iOS native-feel meta tags.
      - viewport-fit=cover lets the content extend behind the iPhone notch
      - theme-color matches the manifest and Android's address bar
      - apple-mobile-web-app-* are required for iOS to treat the page as
        an installed app (no Safari chrome, custom status bar, custom title)
      - apple-touch-icon is the home-screen icon iOS uses; PNG (not SVG)
        because iOS doesn't render SVG in the springboard
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FF3C00" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Carvis" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Carvis" />
    <!--
      Content-Security-Policy via meta tag.
      Production builds (Vite) emit no inline scripts and use ESM, so the
      'self' baseline is sufficient. We keep 'unsafe-inline' / 'unsafe-eval'
      in script-src and ws: in connect-src so `pnpm dev` (Vite HMR) keeps
      working — tighten these in production by setting the CSP header at
      the hosting layer (Render / Vercel). This meta tag is the fallback
      for static hosts that don't honor custom response headers.

      frame-ancestors blocks click-jacking; base-uri 'self' neutralises
      <base href> injection; form-action 'self' prevents off-site form
      posts. api.carvis.app is the standard a CNAME in front of
      the Render web service; if the prod host differs, update
      connect-src or rely on the host header instead.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' ws: wss: https://carvis.app https://*.carvis.app https://*.hf.space; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link
      rel="apple-touch-icon"
      href="/apple-touch-icon.png"
      sizes="180x180"
    />
    <!-- Splash screen background color for iOS — must match the manifest
         background_color to avoid a flash of white before the web app loads. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>Carvis — Canvas Assistant</title>
    <meta
      name="description"
      content="Carvis — your AI study companion for Canvas. Voice, deadlines, grades."
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="Carvis — Canvas Assistant" />
    <meta
      property="og:description"
      content="Carvis — your AI study companion for Canvas."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Carvis — Canvas Assistant" />
    <meta
      name="twitter:description"
      content="Carvis — your AI study companion for Canvas."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      CARVIS typography stack (HUD aesthetic):
      - Orbitron: wordmark, headings, section labels     (geometric, futuristic)
      - Rajdhani:  body copy, descriptions, settings      (slim, slightly technical)
      - JetBrains Mono: data readouts, code, status       (developer-mono)
      - Lato: fallback for any legacy/uncopied text       (kept for compatibility)
      Single CSS2 request keeps payload tight; weights picked so no FOUT flicker.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
