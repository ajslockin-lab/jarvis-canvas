kind = "web"
previewPath = "/"
title = "JARVIS Canvas Assistant"
version = "1.0.0"
id = "artifacts/jarvis-canvas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20034

[services.development]
run = "pnpm --filter @workspace/jarvis-canvas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jarvis-canvas", "run", "build" ]
publicDir = "artifacts/jarvis-canvas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20034"
BASE_PATH = "/"
